name: Publish Resume from Remote

on:
  workflow_dispatch: {}
  # optional: run nightly
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare service account
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
        run: |
          if [ -z "$FIREBASE_SA" ]; then
            echo "FIREBASE_SA secret is not set"; exit 1
          fi
          echo "$FIREBASE_SA" > serviceAccount.json
          chmod 600 serviceAccount.json

      - name: Set env
        run: |
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV
          echo "REMOTE_TEX_URL=${{ secrets.REMOTE_TEX_URL }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
  run: npm install

      - name: Run fetch & upload
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/serviceAccount.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          REMOTE_TEX_URL: ${{ secrets.REMOTE_TEX_URL }}
        run: npm run fetch:tex

      - name: Cleanup
        if: always()
        run: rm -f serviceAccount.json
